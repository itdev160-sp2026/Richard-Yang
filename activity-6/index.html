<!DOCTYPE html>
<html lang="en">

<link rel="stylesheet" href="styles.css" type="text/css">

<head>
    <title>Activity 6: Interactive To-Do List (Part 2)</title>
</head>

<body>
    <header>
        <h1>Activity 6: Interactive To-Do List (Enhanced)</h1>
    </header>
    <main>
        <p><b>Open the browser console (F12) to see the DOM manipulation</b></p>
        <div class="todo-container">
            <div class="input-section">
                <div class="input-controls">
                    <input type="text" id="taskInput" placeholder="Enter a Task">
                    <select id="prioritySelect">
                        <option value="low">Low Priority</option>
                        <option value="medium" selected>Medium Priority</option>
                        <option value="high">High Priority</option>
                    </select>

                    <button id="addTaskBtn">Add Task</button>
                </div>
                <ul id="todo-list"></ul>
                <div class="listSection">
                    <div id="emptyState" class="empty-state">
                        <p>No tasks yet. Add one above! &#128221;</p>
                    </div>
                </div>

                <div class="controls-section">
                    <div class="bulk-actions">
                        <h3>Bulk Actions</h3>
                        <button id="markAllDoneBtn">Mark All Done</button>
                        <button id="deleteCompleteBtn">Delete Completed</button>
                        <button id="clearAllBtn">Clear All Tasks</button>
                    </div>
                </div>
            </div>
            <div class="filter-section">
                <h3>Filter Tasks:</h3>
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>

                </div>
            </div>
            <div class="stats-section">
                <div id="taskStats">
                    <span id="totalTasks">Total: 0</span> |
                    <span id="completedTasks">Completed: 0</span> |
                    <span id="pendingTasks">Pending: 0</span>
                </div>
            </div>

        </div>
        <div id="output"></div>
    </main>
    <script src="demos.js"></script>
    <script src="scripts.js"></script>
</body>

</html>
