<!DOCTYPE html>
<html lang="en">

<link rel="stylesheet" href="styles.css" type="text/css">

<head>
    <title>Activity 5: Simple Math Operations Widget</title>
</head>

<body>
    <header>
        <h1>Activity 5: Simple Math Operations Widget</h1>
    </header>
    <main>
        <p><b>Open the browser console (F12) to see the DOM manipulation</b></p>
        <div class="math-widget">
            <p>Input two numbers and select an operation to calculate</p>
            <input type="number" id="number1" placeholder="Enter first number" />
            <input type="number" id="number2" placeholder="Enter second number" />
            <div id="buttons">
                <button class="opButtons" operator="add">Add</button>
                <button class="opButtons" operator="subtract">Subtract</button>
                <button class="opButtons" operator="multiply">Multiply</button>
                <button class="opButtons" operator="divide">Divide</button>
                <button onclick="clearAll()">Clear</button>
            </div>

        </div>

        <div id="result">
            The Output Will Appear Here
        </div>
    </main>
    <script src="scripts.js"></script>
</body>

</html>
