<!DOCTYPE html>
<html lang="en">

<link rel="stylesheet" href="styles.css" type="text/css">

<head>
    <title>Activity 9: Contact Form Validation</title>
</head>

<body>
    <header>
        <h1>Activity 9: Contact Form Validation</h1>
    </header>
    <main>
        <p><b>Open the browser console (F12) to see the DOM manipulation</b></p>
        <div class="form-container">
      <div class="form-header">
        <h2>Contact Us</h2>
        <p>
          Please fill out all required fields. Validation happens in real-time!
        </p>
      </div>

      <form id="contactForm" class="contact-form" novalidate>
        <div class="form-group">
          <label for="name">Name *</label>
          <input
            type="text"
            id="name"
            name="name"
            required
            placeholder="Enter your full name"
          />
          <div class="error-message" id="nameError"></div>
        </div>

        <div class="form-group">
          <label for="email">Email Address *</label>
          <input
            type="email"
            id="email"
            name="email"
            required
            placeholder="your.email@example.com"
          />
          <div class="error-message" id="emailError"></div>
        </div>

        <div class="form-group">
          <label for="message">Message *</label>
          <textarea
            id="message"
            name="message"
            required
            placeholder="Please enter your message here (minimum 10 characters)..."
            rows="5"
          ></textarea>
          <div class="error-message" id="messageError"></div>
        </div>

        <div class="form-actions">
          <button type="submit" id="submitBtn" class="submit-btn" disabled>
            Send Message
          </button>
        </div>

        <div class="form-status">
          <div id="formSuccess" class="success-status hidden">
            <span class="icon">&#9989;</span>
            <span>Thank you! Your message has been sent successfully.</span>
          </div>
        </div>
      </form>

    </div>



    </main>
    
    <script src="scripts.js"></script>
</body>

</html>
