<!DOCTYPE html>
<html lang="en">

<link rel="stylesheet" href="styles.css" type="text/css">

<head>
    <title>Activity 7: Product Catalog Display</title>
</head>

<body>
    <header>
        <h1>Activity 7: Product Catalog</h1>
    </header>
    <main>
        <p><b>Open the browser console (F12) to see the DOM manipulation</b></p>
        <div class="catalog-container">
            <div class="controls-section">
                <div class="search-controls">
                    <h3>Search & Filter</h3>
                    <input type="text" id="searchInput" placeholder="Search products..." class="search-input">
                    <select id="categoryFilter" class="filter-select">
                        <option value="all">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="clothing">Clothing</option>
                        <option value="books">Books</option>
                    </select>
                    <button id="clearFiltersBtn" class="clear-btn">Clear Filters</button>
                </div>

                <div class="results-info">
                    <span id="resultsCount">Showing all products</span>
                </div>
            </div>

            <div id="product-grid" class="product-grid">
                <!-- Products will be dynamically generated here -->
            </div>
        </div>

    </main>
    <script src="demos.js"></script>
    <script src="scripts.js"></script>
</body>

</html>
